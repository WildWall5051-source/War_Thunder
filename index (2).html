<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Website Background</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .audio-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8); 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        .play-btn {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.3);
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <video id="bg-video" loop muted playsinline class="video-background">
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mp3">
    </audio>

    <div id="overlay" class="audio-overlay">
        <button class="play-btn" onclick="startEverything()">🎵 CLICK TO ENTER</button>
    </div>

    <script>
        function startEverything() {
            var video = document.getElementById("bg-video");
            var audio = document.getElementById("bg-music");
            var overlay = document.getElementById("overlay");
            
            video.play();
            audio.play();
            
            overlay.style.opacity = "0";
            setTimeout(function() {
                overlay.style.display = "none";
            }, 500);
        }
    </script>

</body>
</html>
